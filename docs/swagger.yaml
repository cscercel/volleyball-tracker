        type: array
      match:
        $ref: '#/definitions/github_com_cscercel_volleyball-tracker_internal_db.Match'
      red_team:
        items:
          $ref: '#/definitions/github_com_cscercel_volleyball-tracker_internal_db.MatchPlayer'
        type: array
