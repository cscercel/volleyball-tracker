        type: number
      longest_streak:
        type: integer
      losses:
        type: integer
      match_type:
        type: string
      otl:
        type: integer
      played:
        type: integer
      points:
        type: integer
      scored:
        type: integer
      season:
        type: integer
      stats_id:
        type: string
      streak:
        type: integer
      winloss_ratio:
        type: number
      wins:
        type: integer
    type: object
  github_com_cscercel_volleyball-tracker_internal_service.PlayerWithStats:
